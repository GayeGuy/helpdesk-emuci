name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend — install & test
        working-directory: backend
        run: |
          npm install
          npm test
      - name: Frontend — install & build
        working-directory: frontend
        run: |
          npm install
          npm run build
