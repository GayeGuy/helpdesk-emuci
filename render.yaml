# Blueprint Render — HelpDesk EMUCI (service web unique servant l'API + le frontend).
# Base de données : Neon PostgreSQL (renseigner DATABASE_URL dans le dashboard Render).
services:
  - type: web
    name: helpdesk-emuci
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm run build:all
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: 15m
      - key: REFRESH_TTL
        value: 7d
      # Connexion Neon — à renseigner manuellement (Dashboard → Environment).
      # Format : postgresql://user:password@ep-xxx.eu-central-1.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Frontend servi par le backend (même origine) → CORS non nécessaire, laissé ouvert.
      - key: CORS_ORIGIN
        value: "*"
